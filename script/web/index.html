<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ジョブ一覧画面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f5f5f5;
        }

        .failed {
            color: red;
            font-weight: bold;
        }

        .success {
            color: green;
            font-weight: bold;
        }

        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>
<body>

    <h1>ジョブ一覧画面</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>ジョブ名</th>
                <th>ステータス</th>
                <th>実行日時</th>
                <th>エラーコード</th>
                <th>詳細</th>
            </tr>
        </thead>
        <tbody id="jobTableBody">
        </tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
